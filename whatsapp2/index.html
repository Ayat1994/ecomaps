  // статической страницы нельзя, поэтому localStorage служит второй опорой.
  const MAX_AGE_MS = 400 * 24 * 60 * 60 * 1000;
  const FIREBASE_TIMEOUT_MS = 3000;

  const firebaseConfig = {
    apiKey: "AIzaSyDP4w8D1Ko_kHG5ETy6mfEHUJrJnDDgv8o",
    authDomain: "ecomaps-e25f7.firebaseapp.com",
    databaseURL: "https://ecomaps-e25f7-default-rtdb.firebaseio.com",

    messagingSenderId: "729833139279",

  };

  const FIREBASE_SDK = [
    "https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js",
    "https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"

  // --- Хранилище назначенного номера ---------------------------------------
  // Пишем в localStorage и cookie одновременно: браузеры очищают их по разным
  // правилам, поэтому два хранилища переживают случаи, которые не переживет одно.

  function decode(raw) {
    if (!raw) return null;
    try {
      const data = JSON.parse(raw);
      if (data.v !== SCHEMA_VERSION) return null;
      if (!Number.isInteger(data.i) || data.i < 0 || data.i >= numbers.length) return null;
      if (typeof data.t !== 'number' || Date.now() - data.t > MAX_AGE_MS) return null;
      return data;
    } catch (e) {
      return null;
    }
  }

  function readLocalStorage() {
    try {
      return decode(localStorage.getItem(STORAGE_KEY));
    } catch (e) {
      return null;
    }
  }

  function readCookie() {
    const match = document.cookie.match(new RegExp('(?:^|; )' + STORAGE_KEY + '=([^;]*)'));
    if (!match) return null;
    try {
      return decode(decodeURIComponent(match[1]));
    } catch (e) {
      return null;
    }
  }

  function writeLocalStorage(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      // Приватный режим или переполнение — cookie остается запасным вариантом.
    }
  }

  function writeCookie(data) {
    const value = encodeURIComponent(JSON.stringify(data));
    const maxAge = Math.floor(MAX_AGE_MS / 1000);
    const secure = location.protocol === 'https:' ? '; Secure' : '';
    document.cookie = STORAGE_KEY + '=' + value + '; path=/; max-age=' + maxAge + '; SameSite=Lax' + secure;
  }

  function save(index) {
    const data = { v: SCHEMA_VERSION, i: index, t: Date.now() };
    writeLocalStorage(data);
    writeCookie(data);
    return data;
  }

  // Возвращает сохраненное назначение. Перезапись обеих копий при каждом визите
  // решает две задачи: восстанавливает копию, которую браузер успел удалить, и
  // сдвигает срок жизни — закрепление истекает через MAX_AGE_MS БЕЗДЕЙСТВИЯ,
  // а не через MAX_AGE_MS после первого назначения. Иначе постоянный клиент
  // потерял бы своего менеджера, даже если писал каждый месяц.
  function restore() {
    const data = readLocalStorage() || readCookie();
    if (!data) return null;
    return save(data.i);
  }

  // --- Назначение номера ----------------------------------------------------

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      const script = document.createElement('script');
      script.src = src;
      script.onload = resolve;
      script.onerror = function () { reject(new Error('Failed to load ' + src)); };
      document.head.appendChild(script);
    });
  }

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise(function (_, reject) {
        setTimeout(function () { reject(new Error('Firebase timed out')); }, ms);

  }

  // Общий счетчик в Firebase обеспечивает строгое чередование между номерами.

    return loadScript(FIREBASE_SDK[0])
      .then(function () { return loadScript(FIREBASE_SDK[1]); })

        firebase.initializeApp(firebaseConfig);
        return firebase.database().ref('counter').transaction(function (currentValue) {

      })
      .then(function (transactionResult) {
        if (!transactionResult.committed) throw new Error('Transaction not committed');

        const nextCount = transactionResult.snapshot.val();
        const currentCount = nextCount > 0 ? nextCount - 1 : 0;
        return currentCount % numbers.length;
      });
  }

  // --- Переход --------------------------------------------------------------

  function performRedirect(index, isReturning) {

        return Math.floor(Math.random() * numbers.length);
      })
      .then(function (index) {
        save(index);
        performRedirect(index, false);
      });
  }
});
